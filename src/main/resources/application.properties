spring.application.name=flash-sale-service

# MySQL Connection
spring.datasource.name=xxxxxxxxxxxx
spring.datasource.url=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.datasource.username=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.datasource.password=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT Configuration
# Generate a 256-bit secret key (32 characters long)
jwt.secret=ccccccccccccccccccccccccccccccccccccccc
jwt.expiration=86400000

# Redis Cloud Configuration (Production Style)
spring.redis.host=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.redis.port=xxxxxxxxxxxxxxxx
spring.redis.password=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.redis.ssl=true

# Confluent Cloud Credentials
spring.kafka.bootstrap-servers=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.kafka.properties.sasl.mechanism=xxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.kafka.properties.security.protocol=xxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.kafka.properties.sasl.jaas.config=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Consumer Settings
spring.kafka.consumer.group-id=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.kafka.consumer.auto-offset-reset=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Producer settings
spring.kafka.producer.key-serializer=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.kafka.producer.value-serializer=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Consumer settings
spring.kafka.consumer.key-deserializer=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
spring.kafka.consumer.value-deserializer=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# JSON Trusted Packages
spring.kafka.consumer.properties.spring.json.trusted.packages=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
